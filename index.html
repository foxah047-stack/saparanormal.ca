<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.A.P – Société Acadienne du Paranormal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --red: #b8322a;
  --red-soft: rgba(184, 50, 42, .22);
  --gold: #c5a24a;
  --text: #e9dfc9;
  --muted: #9e927a;
}

html,
body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #000;
  color: var(--text);
  font-family: 'Special Elite', monospace;
}

.intro {
  width: min(1120px, 100vw);
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem 1rem;
}

.intro-inner {
  width: 100%;
  display: grid;
  justify-items: center;
  text-align: center;
}

.intro-logo {
  display: block;
  width: min(940px, 92vw);
  height: auto;
  max-height: 76vh;
  object-fit: contain;
}

.enter-wrap {
  position: relative;
  margin-top: 1.15rem;
  display: grid;
  justify-items: center;
}

.enter-wrap::before {
  content: "";
  position: absolute;
  inset: -1.3rem -3.4rem -1.6rem;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 48%, rgba(184, 50, 42, .12), transparent 54%),
    linear-gradient(90deg, transparent, rgba(184, 50, 42, .05), transparent);
  filter: blur(2px);
  opacity: .9;
}

.enter-wrap::after {
  content: "";
  position: absolute;
  inset: -.85rem -2.5rem -1.05rem;
  z-index: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(184, 50, 42, .075) 0,
      rgba(184, 50, 42, .075) 1px,
      transparent 1px,
      transparent 5px
    );
  opacity: .35;
  animation: signalShift 4.8s steps(2, end) infinite;
}

.enter-link {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  min-width: 118px;
  padding: .88rem 1.55rem;
  border: 1px solid rgba(184, 50, 42, .78);
  background: rgba(184, 50, 42, .035);
  color: var(--text);
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: .74rem;
  font-weight: 700;
  letter-spacing: .26em;
  text-transform: uppercase;
  transition:
    background .25s ease,
    border-color .25s ease,
    color .25s ease,
    transform .25s ease,
    box-shadow .25s ease;
}

.enter-link:hover,
.enter-link:focus-visible {
  background: rgba(184, 50, 42, .18);
  border-color: #d0483d;
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 0 28px rgba(184, 50, 42, .20);
  outline: none;
}

.enter-link::before,
.enter-link::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  height: 1px;
  background: rgba(197, 162, 74, .28);
  opacity: 0;
  transform: scaleX(.5);
  transition: opacity .25s ease, transform .25s ease;
}

.enter-link::before {
  top: 8px;
}

.enter-link::after {
  bottom: 8px;
}

.enter-link:hover::before,
.enter-link:hover::after,
.enter-link:focus-visible::before,
.enter-link:focus-visible::after {
  opacity: 1;
  transform: scaleX(1);
}

.intro-note {
  position: relative;
  z-index: 1;
  margin-top: 1rem;
  color: var(--muted);
  font-family: 'Special Elite', monospace;
  font-size: .7rem;
  letter-spacing: .2em;
  text-transform: uppercase;
}

@keyframes signalShift {
  0%, 88%, 100% {
    transform: translate(0, 0);
    opacity: .35;
  }
  89% {
    transform: translate(3px, -1px);
    opacity: .55;
  }
  90% {
    transform: translate(-2px, 1px);
    opacity: .2;
  }
  91% {
    transform: translate(1px, 0);
    opacity: .42;
  }
}

@media (max-width: 680px) {
  .intro {
    padding: 1.5rem .75rem;
  }

  .intro-logo {
    width: min(620px, 96vw);
    max-height: 68vh;
  }

  .enter-wrap {
    margin-top: .85rem;
  }

  .enter-wrap::before {
    inset: -1rem -1.6rem -1.3rem;
  }

  .enter-wrap::after {
    inset: -.65rem -1.2rem -.85rem;
  }

  .enter-link {
    min-width: 116px;
    min-height: 46px;
    padding: .8rem 1.35rem;
    font-size: .68rem;
    letter-spacing: .22em;
  }

  .intro-note {
    font-size: .58rem;
    letter-spacing: .13em;
  }
}
</style>
</head>
<body>
<main class="intro" aria-label="Page d'entrée S.A.P">
  <section class="intro-inner">
    <img class="intro-logo" src="/assets/img/sapintro.jpg" alt="Société Acadienne du Paranormal">
    <div class="enter-wrap">
      <a class="enter-link" href="/acceuil/">Entrer</a>
      <p class="intro-note">Archives · Enquêtes · Acadie</p>
    </div>
  </section>
</main>
</body>
</html>
