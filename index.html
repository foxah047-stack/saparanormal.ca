<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.A.P – Société Acadienne du Paranormal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#b8322a;
  --red-dim:#6f1d19;
  --gold:#c5a24a;
  --gold-dim:#806b32;
  --blue:#172542;
  --dark:#070707;
  --dark2:#0c0b0a;
  --paper:#d8c59a;
  --paper-dim:#a89773;
  --text:#e9dfc9;
  --muted:#9e927a;
  --line:rgba(197,162,74,.18);
  --redline:rgba(184,50,42,.22);
  --logo-star-offset-x:-4px;
  --logo-star-offset-y:-3px;
}
html,body{
  min-height:100%;
  width:100%;
  overflow-x:hidden;
}
body{
  background:
    radial-gradient(circle at 12% 18%, rgba(184,50,42,.10), transparent 28%),
    radial-gradient(circle at 86% 8%, rgba(23,37,66,.28), transparent 26%),
    radial-gradient(circle at 50% 56%, rgba(197,162,74,.05), transparent 34%),
    linear-gradient(180deg,#050505 0%,#0b0908 48%,#050505 100%);
  color:var(--text);
  font-family:'EB Garamond',serif;
  font-size:18px;
  line-height:1.65;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.045;
  mix-blend-mode:screen;
  animation:grain 700ms steps(2) infinite;
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 4px);
  opacity:.16;
}
@keyframes grain{
  0%{transform:translate(0,0)}
  25%{transform:translate(-1%,1%)}
  50%{transform:translate(1%,-1%)}
  75%{transform:translate(-1%,-1%)}
  100%{transform:translate(1%,1%)}
}

.holding{
  min-height:100vh;
  position:relative;
  display:grid;
  place-items:center;
  padding:3rem 1.25rem;
  overflow:hidden;
}
.holding::before{
  content:'';
  position:absolute;
  inset:0;
  opacity:.23;
  background-image:
    linear-gradient(rgba(197,162,74,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(197,162,74,.07) 1px,transparent 1px);
  background-size:70px 70px;
  mask-image:radial-gradient(circle at 50% 48%,black 0%,transparent 72%);
}
.holding::after{
  content:'ACADIE / DOSSIER / SIGNAL / ARCHIVES / EVP / TERRAIN / TÉMOIGNAGE /';
  position:absolute;
  left:50%;
  bottom:clamp(1.25rem,5vw,3.25rem);
  width:max-content;
  transform:translateX(-50%) rotate(-2deg);
  color:rgba(197,162,74,.08);
  font-family:'Cinzel',serif;
  font-size:clamp(2.2rem,8vw,7rem);
  letter-spacing:.12em;
  white-space:nowrap;
  pointer-events:none;
}
.poster{
  position:relative;
  z-index:2;
  width:min(760px,100%);
  min-height:min(620px,80vh);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:clamp(2.1rem,6vw,4.5rem) clamp(1.35rem,5vw,3.6rem);
  border:1px solid var(--redline);
  background:
    radial-gradient(circle at 50% 23%, rgba(184,50,42,.11), transparent 30%),
    linear-gradient(180deg,rgba(12,11,10,.72),rgba(5,5,5,.54));
  box-shadow:
    0 28px 100px rgba(0,0,0,.42),
    inset 0 0 80px rgba(184,50,42,.035);
}
.poster::before,.poster::after{
  content:'';
  position:absolute;
  width:92px;
  height:92px;
  border-color:rgba(197,162,74,.38);
  pointer-events:none;
}
.poster::before{top:14px;left:14px;border-top:1px solid;border-left:1px solid}
.poster::after{right:14px;bottom:14px;border-right:1px solid;border-bottom:1px solid}
.status{
  position:absolute;
  top:1.35rem;
  right:1.35rem;
  border:2px solid rgba(184,50,42,.48);
  color:rgba(184,50,42,.74);
  font-family:'Special Elite',monospace;
  font-size:.82rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:.35rem .62rem;
  transform:rotate(7deg);
  animation:softFlicker 9s steps(1,end) 2s infinite;
}
.logo-lockup{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1rem;
  margin-bottom:2rem;
}
.logo-emblem{
  width:120px;
  height:120px;
  border-radius:50%;
  position:relative;
  display:grid;
  place-items:center;
  background:rgba(197,162,74,.035);
  box-shadow:0 0 38px rgba(184,50,42,.12) inset, 0 0 44px rgba(197,162,74,.08);
}
.logo-svg{
  position:absolute;
  inset:0;
  width:120px;
  height:120px;
  overflow:visible;
}
.logo-svg path{
  fill:none;
  stroke-width:1;
  vector-effect:non-scaling-stroke;
  stroke-dasharray:100;
  stroke-dashoffset:100;
  opacity:0;
}
.logo-circle-outer{
  stroke:rgba(197,162,74,.58);
  animation:drawCircle 1.25s ease-out forwards, circleOccasionalFlicker 9s steps(1,end) 3.8s infinite;
}
.logo-circle-inner{
  stroke:rgba(184,50,42,.40);
  animation:drawCircle 1.05s ease-out .35s forwards, circleOccasionalFlicker 9s steps(1,end) 4.1s infinite;
}
.logo-star{
  color:var(--gold);
  font-size:2rem;
  line-height:1;
  opacity:0;
  position:relative;
  z-index:2;
  transform:translate(var(--logo-star-offset-x),var(--logo-star-offset-y));
  transform-origin:center;
  animation:starFlicker 1s steps(1,end) 1.55s forwards, starOccasionalFlicker 12s steps(1,end) 8s infinite;
}
.logo-wordmark{
  width:min(260px,72vw);
  height:auto;
  display:block;
  opacity:0;
  clip-path:inset(0 100% 0 0);
  animation:sapLettersAppear 1.5s steps(3,end) 2.45s forwards, wordmarkGlow .8s ease 4.1s forwards;
}
.kicker{
  font-family:'Special Elite',monospace;
  color:var(--red);
  font-size:clamp(.76rem,2vw,1rem);
  letter-spacing:.24em;
  text-transform:uppercase;
  margin-bottom:1.1rem;
  animation:softFlicker 8s steps(1,end) infinite;
}
h1{
  font-family:'Cinzel',serif;
  color:#f5ecd9;
  font-size:clamp(2.15rem,7vw,4.6rem);
  line-height:.98;
  letter-spacing:.05em;
  text-transform:uppercase;
  text-shadow:0 0 38px rgba(184,50,42,.16);
  margin-bottom:1rem;
}
h1 span{
  display:block;
  color:var(--gold);
  font-size:.45em;
  letter-spacing:.24em;
  margin-top:.55rem;
}
.subtitle{
  max-width:560px;
  color:var(--paper-dim);
  font-size:clamp(1.05rem,2.5vw,1.32rem);
  margin:0 auto 1.65rem;
}
.notice{
  font-family:'Special Elite',monospace;
  color:var(--red);
  font-size:clamp(.82rem,2.2vw,1rem);
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:1.2rem;
}
.contact{
  color:var(--muted);
  font-size:1rem;
}
.contact a{
  color:var(--gold);
  text-decoration:none;
  border-bottom:1px solid rgba(197,162,74,.32);
}
.contact a:hover{color:#f0cf72}
.scanline{
  position:absolute;
  left:0;
  right:0;
  top:-20%;
  height:20%;
  z-index:1;
  pointer-events:none;
  background:linear-gradient(to bottom,transparent,rgba(197,162,74,.035),transparent);
  animation:scan 8s linear infinite;
}
@keyframes scan{
  0%{transform:translateY(0)}
  100%{transform:translateY(720%)}
}
@keyframes drawCircle{
  0%{stroke-dashoffset:100;opacity:1}
  100%{stroke-dashoffset:0;opacity:1}
}
@keyframes circleOccasionalFlicker{
  0%,82%,85%,88%,91%,100%{opacity:1;filter:none}
  83%{opacity:.22;filter:brightness(1.8)}
  84%{opacity:1;filter:brightness(1.3)}
  86%{opacity:.35;filter:brightness(.8)}
  89%{opacity:.12;filter:brightness(2)}
  90%{opacity:1;filter:brightness(1.4)}
}
@keyframes starFlicker{
  0%,16%,32%,48%{opacity:0;text-shadow:none}
  8%,24%,40%,60%,100%{opacity:1;text-shadow:0 0 12px rgba(197,162,74,.72)}
  72%{opacity:.35}
  84%{opacity:1;text-shadow:0 0 18px rgba(184,50,42,.45)}
}
@keyframes starOccasionalFlicker{
  0%,92%,100%{opacity:1}
  93%{opacity:.22}
  94%{opacity:1}
  96%{opacity:.48}
  97%{opacity:1}
}
@keyframes sapLettersAppear{
  0%{opacity:1;clip-path:inset(0 100% 0 0)}
  33%{opacity:1;clip-path:inset(0 66% 0 0)}
  66%{opacity:1;clip-path:inset(0 33% 0 0)}
  100%{opacity:1;clip-path:inset(0 0 0 0)}
}
@keyframes wordmarkGlow{
  0%{filter:drop-shadow(0 0 0 rgba(197,162,74,0))}
  50%{filter:drop-shadow(0 0 11px rgba(197,162,74,.48))}
  100%{filter:drop-shadow(0 0 4px rgba(197,162,74,.18))}
}
@keyframes softFlicker{
  0%,78%,81%,84%,87%,100%{opacity:1;text-shadow:0 0 9px rgba(184,50,42,.22)}
  79%{opacity:.22;text-shadow:none}
  80%{opacity:1;text-shadow:0 0 15px rgba(184,50,42,.55)}
  82%{opacity:.45;text-shadow:none}
  83%{opacity:1;text-shadow:0 0 12px rgba(184,50,42,.42)}
  85%{opacity:.16;text-shadow:none}
  86%{opacity:1;text-shadow:0 0 18px rgba(184,50,42,.6)}
}
@media(max-width:680px){
  .holding{padding:1rem}
  .holding::after{
    bottom:1.15rem;
    font-size:2.25rem;
    white-space:normal;
    line-height:1.1;
    width:115vw;
  }
  .poster{
    min-height:calc(100vh - 2rem);
    padding:3.2rem 1.15rem 2.2rem;
  }
  .status{
    top:1rem;
    right:1rem;
    font-size:.64rem;
  }
  .logo-emblem{width:92px;height:92px}
  .logo-svg{width:92px;height:92px}
  .logo-star{font-size:1.55rem}
  .logo-wordmark{width:min(220px,70vw)}
  .kicker{letter-spacing:.16em}
  h1{letter-spacing:.035em}
  h1 span{letter-spacing:.18em}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation:none !important;
    transition:none !important;
  }
  .logo-svg path,.logo-star,.logo-wordmark{
    opacity:1 !important;
    clip-path:none !important;
    stroke-dashoffset:0 !important;
  }
}
</style>
</head>
